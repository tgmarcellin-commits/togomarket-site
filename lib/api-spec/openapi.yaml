openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: TogoMarket API
servers:
  - url: /api
    description: Base API path
tags:
  - name: Storage
    description: Object storage upload and serving endpoints.
  - name: health
    description: Health operations
  - name: listings
    description: Marketplace listing operations
  - name: orders
    description: Custom order operations
  - name: admin
    description: Admin operations
  - name: stats
    description: Statistics operations
  - name: ads
    description: Advertisement operations
  - name: vendors
    description: Vendor account operations
paths:
  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /listings:
    get:
      operationId: getListings
      tags: [listings]
      summary: Get all listings
      parameters:
        - name: sector
          in: query
          required: false
          schema:
            type: string
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Listing"
    post:
      operationId: createListing
      tags: [listings]
      summary: Create a new listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListingInput"
      responses:
        "201":
          description: Listing created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"

  /admin/listings/create:
    post:
      operationId: adminCreateListing
      tags: [admin]
      summary: Create and publish a listing directly (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCreateListingInput"
      responses:
        "201":
          description: Listing created and published
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"
        "403":
          description: Forbidden

  /admin/listings/delete:
    post:
      operationId: adminDeleteListing
      tags: [admin]
      summary: Delete a listing (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminDeleteInput"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"
        "403":
          description: Forbidden

  /orders:
    post:
      operationId: createOrder
      tags: [orders]
      summary: Submit a custom order request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Order submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /admin/verify:
    post:
      operationId: verifyAdmin
      tags: [admin]
      summary: Verify admin password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminVerifyInput"
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminVerifyResult"

  /admin/listings/approve:
    post:
      operationId: adminApproveListing
      tags: [admin]
      summary: Approve a pending listing (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminApproveInput"
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"
        "403":
          description: Forbidden

  /admin/listings/pending:
    post:
      operationId: adminGetPendingListings
      tags: [admin]
      summary: Get listings pending approval (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminPasswordInput"
      responses:
        "200":
          description: Pending listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Listing"
        "403":
          description: Forbidden

  /admin/settings:
    get:
      operationId: getAdminSettings
      tags: [admin]
      summary: Get platform settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformSettings"
    post:
      operationId: updateAdminSettings
      tags: [admin]
      summary: Update platform settings (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSettingsInput"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformSettings"
        "403":
          description: Forbidden

  /ads:
    get:
      operationId: getActiveAds
      tags: [ads]
      summary: Get active advertisements
      responses:
        "200":
          description: List of active ads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ad"

  /admin/ads:
    post:
      operationId: adminCreateAd
      tags: [admin, ads]
      summary: Create a new advertisement (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCreateAdInput"
      responses:
        "201":
          description: Ad created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ad"
        "403":
          description: Forbidden

  /admin/ads/all:
    post:
      operationId: adminGetAllAds
      tags: [admin, ads]
      summary: Get all ads including expired (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminPasswordInput"
      responses:
        "200":
          description: All ads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ad"
        "403":
          description: Forbidden

  /admin/ads/delete:
    post:
      operationId: adminDeleteAd
      tags: [admin, ads]
      summary: Delete an advertisement (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminDeleteInput"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"
        "403":
          description: Forbidden

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get marketplace statistics
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketStats"

  /vendors/register:
    post:
      operationId: vendorRegister
      tags: [vendors]
      summary: Register a new vendor account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VendorRegisterInput"
      responses:
        "201":
          description: Vendor registered (pending admin activation)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorRegisterResult"
        "409":
          description: Phone number already registered

  /vendors/login:
    post:
      operationId: vendorLogin
      tags: [vendors]
      summary: Login as a vendor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VendorLoginInput"
      responses:
        "200":
          description: Vendor profile with publish code status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorProfile"
        "401":
          description: Invalid credentials

  /vendors/profile/update:
    post:
      operationId: vendorUpdateProfile
      tags: [vendors]
      summary: Update vendor profile photo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VendorProfileUpdateInput"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorProfile"
        "401":
          description: Invalid credentials

  /admin/vendors:
    post:
      operationId: adminGetVendors
      tags: [admin, vendors]
      summary: Get all vendor accounts (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminPasswordInput"
      responses:
        "200":
          description: All vendors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VendorProfile"
        "403":
          description: Forbidden

  /admin/vendors/activate:
    post:
      operationId: adminActivateVendor
      tags: [admin, vendors]
      summary: Activate a vendor account and generate first free publish code (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminActivateVendorInput"
      responses:
        "200":
          description: Activated with generated code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminActivateVendorResult"
        "403":
          description: Forbidden

  /admin/vendors/generate-code:
    post:
      operationId: adminGenerateVendorCode
      tags: [admin, vendors]
      summary: Generate a new publish code for a vendor (admin only, after payment)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminActivateVendorInput"
      responses:
        "200":
          description: New code generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminActivateVendorResult"
        "403":
          description: Forbidden

components:
  schemas:
    Ad:
      type: object
      required: [id, advertiserName, advertiserPhone, message, startDate, endDate]
      properties:
        id:
          type: integer
        advertiserName:
          type: string
        advertiserPhone:
          type: string
        message:
          type: string
        image:
          type: ["string", "null"]
        videoPath:
          type: ["string", "null"]
        startDate:
          type: string
        endDate:
          type: string

    AdminCreateAdInput:
      type: object
      required: [password, advertiserName, advertiserPhone, message]
      properties:
        password:
          type: string
        advertiserName:
          type: string
        advertiserPhone:
          type: string
        message:
          type: string
        image:
          type: string
        videoPath:
          type: string

    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    Listing:
      type: object
      required: [id, name, price, location, sector, createdAt, images, approved]
      properties:
        id:
          type: integer
        name:
          type: string
        price:
          type: number
        location:
          type: string
        sector:
          type: string
        images:
          type: array
          items:
            type: string
        createdAt:
          type: string
        phone:
          type: ["string", "null"]
        approved:
          type: boolean

    ListingInput:
      type: object
      required: [name, price, location, sector, images, vendorPhone, vendorPassword, vendorPublishCode]
      properties:
        name:
          type: string
        price:
          type: number
        location:
          type: string
        sector:
          type: string
          enum: [AgriMarket, Immobilier, Automobile, Divers]
        images:
          type: array
          items:
            type: string
          maxItems: 4
        vendorPhone:
          type: string
        vendorPassword:
          type: string
        vendorPublishCode:
          type: string

    DeleteResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    Order:
      type: object
      required: [id, lastName, firstName, phone, description, createdAt]
      properties:
        id:
          type: integer
        lastName:
          type: string
        firstName:
          type: string
        phone:
          type: string
        description:
          type: string
        createdAt:
          type: string

    OrderInput:
      type: object
      required: [lastName, firstName, phone, description]
      properties:
        lastName:
          type: string
        firstName:
          type: string
        phone:
          type: string
        description:
          type: string

    AdminDeleteInput:
      type: object
      required: [id, password]
      properties:
        id:
          type: integer
        password:
          type: string

    AdminCreateListingInput:
      type: object
      required: [password, name, price, location, sector, phone, images]
      properties:
        password:
          type: string
        name:
          type: string
        price:
          type: number
        location:
          type: string
        sector:
          type: string
        phone:
          type: string
        images:
          type: array
          items:
            type: string

    AdminVerifyInput:
      type: object
      required: [password]
      properties:
        password:
          type: string

    AdminVerifyResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    AdminApproveInput:
      type: object
      required: [id, password]
      properties:
        id:
          type: integer
        password:
          type: string

    AdminPasswordInput:
      type: object
      required: [password]
      properties:
        password:
          type: string

    PlatformSettings:
      type: object
      required: [commissionRate]
      properties:
        commissionRate:
          type: integer

    UpdateSettingsInput:
      type: object
      required: [password, commissionRate]
      properties:
        password:
          type: string
        commissionRate:
          type: integer

    MarketStats:
      type: object
      required: [total, bysector]
      properties:
        total:
          type: integer
        bysector:
          type: array
          items:
            $ref: "#/components/schemas/SectorStat"

    SectorStat:
      type: object
      required: [sector, count]
      properties:
        sector:
          type: string
        count:
          type: integer

    VendorPublishCode:
      type: object
      required: [code, endDate, daysLeft]
      properties:
        code:
          type: string
        endDate:
          type: string
        daysLeft:
          type: integer

    VendorProfile:
      type: object
      required: [id, firstName, lastName, phone, verified, createdAt]
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        verified:
          type: boolean
        profilePhoto:
          type: ["string", "null"]
        createdAt:
          type: string
        publishCode:
          oneOf:
            - $ref: "#/components/schemas/VendorPublishCode"
            - type: "null"

    VendorRegisterInput:
      type: object
      required: [firstName, lastName, phone, password]
      properties:
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        password:
          type: string

    VendorRegisterResult:
      type: object
      required: [id, firstName, lastName, phone, verifyCode]
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        verifyCode:
          type: string

    VendorLoginInput:
      type: object
      required: [phone, password]
      properties:
        phone:
          type: string
        password:
          type: string

    VendorProfileUpdateInput:
      type: object
      required: [phone, password]
      properties:
        phone:
          type: string
        password:
          type: string
        profilePhoto:
          type: ["string", "null"]

    AdminActivateVendorInput:
      type: object
      required: [password, vendorId]
      properties:
        password:
          type: string
        vendorId:
          type: integer

    AdminActivateVendorResult:
      type: object
      required: [success, code, vendorPhone]
      properties:
        success:
          type: boolean
        code:
          type: string
        vendorPhone:
          type: string

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
        objectPath:
          type: string
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
