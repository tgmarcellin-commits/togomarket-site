kind = "web"
previewPath = "/"
title = "TogoMarket"
version = "1.0.0"
id = "artifacts/togomarket"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24326

[services.development]
run = "pnpm --filter @workspace/togomarket run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/togomarket", "run", "build" ]
publicDir = "artifacts/togomarket/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24326"
BASE_PATH = "/"
